<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>○○생명 오늘의 추천</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="brand">○○생명</p>
          <h1 id="page-title">오늘의 추천</h1>
          <time id="today-date" class="today-date" datetime="">오늘</time>
          <p class="hero-line">오늘의 컨디션과 생활 흐름에 맞춰, 꼭 필요한 보장부터 차분히 살펴보세요.</p>
        </div>
        <figure class="hero-visual" aria-label="오늘의 추천 화면을 표현한 카드와 보호 상징 이미지">
          <img src="assets/hero-recommendation.png" alt="" />
        </figure>
      </section>

      <section class="recommendations" aria-label="추천 카드 영역">
        <article class="recommendation-slot" aria-label="첫 번째 추천 카드 빈 자리">
          <div class="slot-accent"></div>
          <div class="slot-lines" aria-hidden="true">
            <span></span>
            <span></span>
          </div>
        </article>
        <article class="recommendation-slot" aria-label="두 번째 추천 카드 빈 자리">
          <div class="slot-accent"></div>
          <div class="slot-lines" aria-hidden="true">
            <span></span>
            <span></span>
          </div>
        </article>
        <article class="recommendation-slot" aria-label="세 번째 추천 카드 빈 자리">
          <div class="slot-accent"></div>
          <div class="slot-lines" aria-hidden="true">
            <span></span>
            <span></span>
          </div>
        </article>
        <article class="recommendation-slot" aria-label="네 번째 추천 카드 빈 자리">
          <div class="slot-accent"></div>
          <div class="slot-lines" aria-hidden="true">
            <span></span>
            <span></span>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
